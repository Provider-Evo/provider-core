name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "echotools>=2.3.8" "provider-sdk>=0.3.3"
          pip install --upgrade "git+https://github.com/nichengfuben/echotools.git@v2.3.11"
          pip install --upgrade "git+https://github.com/Provider-Evo/provider-sdk.git@v0.3.6"
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest tests/ -q --tb=short
          else
            python -m compileall -q src
            python -c "from src.core.utils.compat.tools import normalize_tool_calls"
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "echotools>=2.3.8" "provider-sdk>=0.3.3"
          pip install --upgrade "git+https://github.com/nichengfuben/echotools.git@v2.3.11"
          pip install --upgrade "git+https://github.com/Provider-Evo/provider-sdk.git@v0.3.6"
          pip install -e .
      - name: Syntax and import smoke
        run: |
          python -m compileall -q src
          python -c "from src.core.utils.compat.tools import normalize_tool_calls"
