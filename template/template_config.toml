# Provider-Evo 主配置模板
# 复制到 config/main_config.toml 后按需修改。
# 字段与 WebUI 配置面板（config_panel_schema）及 src/core/config/sections.py 对齐。

[server]
version = "2.2.301"               # 与 pyproject.toml / 打包脚本一致
host = "0.0.0.0"
port = 1337
debug = false
startup_force_kill_port = true  # 端口被占用时尝试终止占用进程
fast_restart = true             # WebUI/L4 重启：true 快速 exit 42，false 完整关停链
max_restarts = 3                # Runner 在 Worker 异常退出时的最大自动重启次数

[anthropic]
api_version = "2023-06-01"

[anthropic.model_mapping]
# 协议级映射（仅 Anthropic 路由，优先级最高）
# "claude-sonnet-4-6" = "qwen3-coder-plus"

[openai.model_mapping]
# 协议级映射（仅 OpenAI 路由，优先级最高）
# "gpt-4o" = "qwen-plus"

[model_mapping.anthropic]
# 根级 Anthropic 映射（中等优先级）
# "claude-fast" = "qwen-plus"

[model_mapping.openai]
# 根级 OpenAI 映射（中等优先级）
# "gpt-fast" = "qwen-plus"

[auth]
enabled = false
keys = []                       # 示例: ["sk-your-api-key"]
group_list_type = "blacklist"   # "blacklist" | "whitelist"
group_list = []

[gateway]
concurrent_enabled = true
concurrent_count = 3
min_tokens = 10
# 并发竞速平台名单（插件平台名，非 legacy src/platforms 目录名）
# group_list 为空：所有平台均可竞速
group_list_type = "whitelist"
group_list = ["qwen", "ollama", "zen"]

[http_pool]
limit = 200
limit_per_host = 20
keepalive_timeout = 30
connect_timeout = 10

[proxy]
proxy_server = ""
proxy_enabled = false
proxy_urls = []                 # 正则；非空时匹配 URL 走 proxy_server

[adapter_proxy]
# 允许代理切换的适配器（语义由 group_list_type 决定）
enable_adapters = ["qwen", "ollama"]
group_list_type = "whitelist"   # "whitelist" | "blacklist"

# 向后兼容
[platforms_proxy]
enabled_platforms = ["qwen", "ollama"]
group_list_type = "whitelist"

[platforms]
# 启用的平台插件（plugins/ 下目录名 / manifest id）
platform_list_type = "blacklist"  # "blacklist": 排除列表; "whitelist": 仅列表内
platform_list = []
# 示例：排除未安装或废弃插件
# platform_list = ["legacy-platform-name"]

[fncall]
# entml | xml | antml | original | nous | bracket | dsml | custom
protocol = "entml"
record_prompt = false
print_prompt = false            # true 时将注入后的 prompt 写入 logs/prompts/
custom_prompt_en = ""
custom_prompt_zh = ""

[fncall.fncall_mapping]
# 按平台覆盖协议
# "qwen" = "nous"
# "ollama" = "xml"

# [fncall.templates]
# usage_en = "..."
# usage_zh = "..."

[debug]
level = "INFO"                  # DEBUG | INFO | WARNING | ERROR | CRITICAL
color = true
access_log = true
log_name = "provider-core"      # 日志文件名前缀（logs/{log_name}-*.log）

[autoupdate]
enabled = false
branch = "dev"
interval = 300
diff_update = true
mirrors = ["https://github.com/"]

[fallback]
enabled = true
# [fallback.chains]
# "primary-model" = ["backup-model", "ollama-local"]

[cache]
enabled = false
max_entries = 512
ttl_seconds = 3600

[circuit]
enabled = true
window_size = 20
failure_threshold = 0.5
cooldown_seconds = 300

[virtual_keys]
enabled = false

[rate_limit]
enabled = false
key_rpm = 600
ip_rpm = 180

[metrics]
enabled = true

[terminal]
backend = "direct"                # direct | tmux (Unix，重启后可 attach)
preserve_on_reload = true         # L3 exit 42 不 kill shell
preserve_on_shutdown = false      # SIGTERM 时是否保留 shell（仅 detach+flush）
ring_buffer_kb = 256
orphan_alive_hours = 24
orphan_destroyed_days = 7
require_ssh_host_key = true
max_history_lines = 5000
subprocess_monitor_interval = 1
enable_subprocess_monitoring = true
audit_enabled = true                # 是否记录终端会话审计日志（供录像审计功能查看）

